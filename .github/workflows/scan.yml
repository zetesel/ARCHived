name: Update Dead Projects

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run scraper and build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Customize these if you want to change collection criteria
          ARCHIVED_MONTHS: '12'
          ARCHIVED_MIN_STARS: '10'
        run: |
          python scraper/collect.py --months "$ARCHIVED_MONTHS" --min-stars "$ARCHIVED_MIN_STARS" --output dead-projects.json
          python build.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
