name: CI

on:
  push:
    branches: [ main, fix/frontend-dom-guards ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Opt into running JavaScript actions on Node.js 24 now to avoid deprecation
      # annotation and ensure compatibility when Node.js 20 is removed.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          # Use Python 3.11 so modern dependency versions (requests>=2.33) are available
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run tests
        run: |
          # Ensure repository root is on PYTHONPATH so tests can import local modules
          PYTHONPATH=. pytest -q
