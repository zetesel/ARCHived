name: CI

on:
  push:
    branches: [ main, fix/frontend-dom-guards ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          # Use Python 3.11 so modern dependency versions (requests>=2.33) are available
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run tests
        run: |
          pytest -q
