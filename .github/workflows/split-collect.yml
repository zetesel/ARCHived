name: Split Collect

on:
  schedule:
    - cron: '0 6 * * 0' # weekly on Sunday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  split-collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set PYTHONPATH for local package imports
        # Ensure the runner can import the local `scraper` package when running Python
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run split collector (merge by stars)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: prefer a PAT provided as a secret for higher rate limits
          SPLIT_COLLECT_PAT: ${{ secrets.SPLIT_COLLECT_PAT }}
        run: |
          # Debug: show current commit and the split_collect.py header
          git rev-parse --verify HEAD || true
          sed -n '1,120p' scraper/split_collect.py || true
          python scraper/split_collect.py --months 12 --min-stars 10 --output dead-projects.json --max-sub-buckets 200

      - name: Upload merged data artifact (dead-projects.json)
        uses: actions/upload-artifact@v4
        with:
          name: dead-projects-json-merged
          path: dead-projects.json
