name: Update Dead Projects

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run pip-audit
        run: |
          set -e
          python -m pip install --upgrade pip-audit
          # Run pip-audit and fail the step if vulnerabilities are found.
          # Remove the `set -e` above if you prefer the job to continue on
          # pip-audit failures.
          python -m pip_audit -r scraper/requirements.txt

      - name: Set PYTHONPATH for tests
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Run tests
        run: |
          # Run unit tests (tests use responses to mock network)
          pytest -q

      - name: Run scraper and build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Customize these if you want to change collection criteria
          ARCHIVED_MONTHS: '12'
          ARCHIVED_MIN_STARS: '10'
        run: |
          python scraper/collect.py --months "$ARCHIVED_MONTHS" --min-stars "$ARCHIVED_MIN_STARS" --output dead-projects.json
          python build.py

      - name: Check for API truncation
        env:
          FAIL_ON_TRUNCATED: 'false'
        run: |
          pip install --upgrade pip || true
          python scripts/check_truncation.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload generated data artifact (dead-projects.json)
        uses: actions/upload-artifact@v4
        with:
          name: dead-projects-json
          path: dead-projects.json

      - name: Upload site artifact (docs)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
